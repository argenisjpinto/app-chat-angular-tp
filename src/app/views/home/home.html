<app-header></app-header>

<main class="chat-layout">
  <aside class="chat-layout__sidebar">
    <app-chat-list
      [chats]="filteredChats()"
      [selectedChatId]="selectedChatId"
      [searchTerm]="searchTerm()"
      (searchTermChange)="onSearchTermChange($event)"
    ></app-chat-list>
  </aside>

  <section class="chat-layout__content">
    @if (chatNotFound) {
      <div class="chat-layout__fallback">
        <h3>Chat no encontrado</h3>
        <p>La conversación que intentaste abrir no existe o fue removida.</p>
      </div>
    } @else {
      <app-chat-window
        [chat]="selectedChat"
        (sendMessage)="onSendMessage($event)"
      ></app-chat-window>
    }
  </section>
</main>

<app-footer></app-footer>
